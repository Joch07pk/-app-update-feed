# .github/workflows/check_updates.yml
name: Check App Updates

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update checker
        env:
          GH_GIST_TOKEN: ${{ secrets.GH_GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: python check_updates.py

      - name: Commit bijgewerkte bestanden
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Voeg bestanden toe als ze bestaan
          [ -f feed.xml ] && git add feed.xml
          [ -f app_versions.json ] && git add app_versions.json
          git diff --cached --quiet || git commit -m "chore: update app feed $(date +'%Y-%m-%d')"
          git diff --cached --quiet || git push
